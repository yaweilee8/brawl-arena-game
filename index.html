<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>荒野乱斗移动版 - Brawl Arena Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Arial', sans-serif;
        }
        
        .game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #gameCanvas {
            display: block;
            background: #2d4a3e;
            max-width: 100%;
            max-height: 100%;
        }
        
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }
        
        /* Health bar at top center */
        .health-bar-container {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 24px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3), inset 0 0 10px rgba(0, 0, 0, 0.5);
        }
        
        .health-bar-container .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff3838, #ff8c42, #ffdd42);
            transition: width 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .health-bar-container .health-fill::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            animation: healthShine 2s infinite;
        }
        
        @keyframes healthShine {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        
        .health-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-weight: bold;
            font-size: 12px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }
        
        /* Super bar */
        .super-bar-container {
            position: absolute;
            top: 38px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 12px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 6px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .super-bar-container .super-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #ec4899, #f59e0b);
            transition: width 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .super-bar-container .super-fill::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
            animation: superShine 1.5s infinite;
        }
        
        @keyframes superShine {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        
        .super-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 8px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }
        
        .super-bar-container.super-ready {
            animation: superReady 0.5s infinite;
        }
        
        @keyframes superReady {
            0%, 100% { box-shadow: 0 0 5px #ff00ff; }
            50% { box-shadow: 0 0 20px #ff00ff, 0 0 30px #ff00ff; }
        }
        
        /* Ammo bar */
        .ammo-bar {
            position: absolute;
            top: 55px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
        }
        
        .ammo-bullet {
            width: 12px;
            height: 20px;
            background: linear-gradient(180deg, #ffff44, #ffaa00);
            border-radius: 3px;
            border: 1px solid #fff;
            transition: opacity 0.2s;
        }
        
        .ammo-bullet.empty {
            opacity: 0.3;
        }
        
        /* Score board */
        .score-board {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 14px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 10px;
        }
        
        /* Kill feed */
        .kill-feed {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #fff;
            font-size: 12px;
            text-align: right;
        }
        
        .kill-message {
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 5px;
            margin-bottom: 5px;
            animation: slideIn 0.5s;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Virtual Joystick - Left Bottom */
        .joystick-container {
            position: absolute;
            bottom: 80px;
            left: 60px;
            width: 120px;
            height: 120px;
            pointer-events: auto;
            z-index: 100;
        }
        
        .joystick-base {
            position: absolute;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            backdrop-filter: blur(5px);
        }
        
        .joystick-stick {
            position: absolute;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(200,200,200,0.6));
            border: 2px solid rgba(255,255,255,0.9);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.05s;
        }
        
        .joystick-stick.active {
            background: linear-gradient(135deg, rgba(100,200,255,0.9), rgba(80,150,255,0.7));
        }
        
        /* Action Buttons - Right Bottom */
        .action-buttons {
            position: absolute;
            bottom: 60px;
            right: 40px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 15px;
            pointer-events: auto;
            z-index: 100;
        }
        
        .btn-shoot {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,200,50,0.8), rgba(255,150,0,0.6));
            border: 3px solid rgba(255,255,255,0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            box-shadow: 0 4px 20px rgba(255,150,0,0.4);
            transition: all 0.1s;
        }
        
        .btn-shoot:active, .btn-shoot.active {
            transform: scale(0.92);
            background: linear-gradient(135deg, rgba(255,220,100,0.95), rgba(255,180,50,0.8));
            box-shadow: 0 2px 10px rgba(255,150,0,0.6), inset 0 0 20px rgba(255,255,255,0.3);
        }
        
        .btn-shoot::before {
            content: '🔫';
        }
        
        .btn-super {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(180,50,255,0.8), rgba(255,50,180,0.6));
            border: 3px solid rgba(255,255,255,0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            box-shadow: 0 4px 20px rgba(200,50,255,0.4);
            transition: all 0.1s;
            margin-right: 10px;
        }
        
        .btn-super:active, .btn-super.active {
            transform: scale(0.92);
            background: linear-gradient(135deg, rgba(200,100,255,0.95), rgba(255,100,200,0.8));
            box-shadow: 0 2px 10px rgba(200,50,255,0.6), inset 0 0 20px rgba(255,255,255,0.3);
        }
        
        .btn-super.ready {
            animation: superButtonPulse 1s infinite;
            border-color: #ffff00;
        }
        
        @keyframes superButtonPulse {
            0%, 100% { box-shadow: 0 4px 20px rgba(200,50,255,0.4); }
            50% { box-shadow: 0 4px 30px rgba(255,255,0,0.8), 0 0 40px rgba(255,0,255,0.6); }
        }
        
        .btn-super::before {
            content: '⚡';
        }
        
        /* Aim control area (invisible, covers right side of screen) */
        .aim-area {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            pointer-events: auto;
            z-index: 50;
        }
        
        /* Character selector */
        .character-selector {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            pointer-events: auto;
            max-width: 90vw;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 200;
        }
        
        .character-selector h2 {
            color: #fff;
            margin-bottom: 15px;
            font-size: 22px;
        }
        
        .brawler-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .brawler-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 3px solid transparent;
            border-radius: 12px;
            padding: 12px 8px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        
        .brawler-card:hover, .brawler-card.focused {
            transform: scale(1.05);
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        
        .brawler-card.selected {
            border-color: #ffff00;
            box-shadow: 0 0 30px rgba(255,255,0,0.6);
        }
        
        .brawler-card.focused::before {
            content: '▶';
            position: absolute;
            left: -15px;
            top: 50%;
            transform: translateY(-50%);
            color: #ffff00;
            font-size: 16px;
            animation: pulse 0.8s infinite;
        }
        
        .brawler-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            margin: 0 auto 8px;
        }
        
        .brawler-card h3 {
            color: #fff;
            font-size: 13px;
        }
        
        .brawler-card p {
            color: #aaa;
            font-size: 10px;
            margin-top: 3px;
        }
        
        .start-btn {
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .start-btn:hover {
            transform: scale(1.05);
        }
        
        .controls-hint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 12px;
            text-align: center;
            opacity: 0.7;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 15px;
        }
        
        /* Pause button */
        .pause-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            color: #fff;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            z-index: 100;
        }
        
        /* Orientation warning */
        .orientation-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        
        .orientation-warning .icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: rotatePhone 2s infinite;
        }
        
        @keyframes rotatePhone {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(90deg); }
            75% { transform: rotate(90deg); }
        }
        
        @media screen and (orientation: portrait) and (max-width: 600px) {
            .orientation-warning {
                display: flex;
            }
        }
        
        /* Responsive adjustments */
        @media (max-height: 500px) {
            .joystick-container {
                bottom: 50px;
                left: 40px;
                width: 100px;
                height: 100px;
            }
            
            .joystick-base {
                width: 100px;
                height: 100px;
            }
            
            .joystick-stick {
                width: 40px;
                height: 40px;
            }
            
            .btn-shoot {
                width: 70px;
                height: 70px;
                font-size: 20px;
            }
            
            .btn-super {
                width: 55px;
                height: 55px;
                font-size: 16px;
            }
            
            .action-buttons {
                bottom: 40px;
                right: 25px;
            }
        }
        
        @media (min-width: 768px) {
            .joystick-container {
                bottom: 100px;
                left: 80px;
                width: 140px;
                height: 140px;
            }
            
            .joystick-base {
                width: 140px;
                height: 140px;
            }
            
            .joystick-stick {
                width: 60px;
                height: 60px;
            }
            
            .btn-shoot {
                width: 100px;
                height: 100px;
            }
            
            .btn-super {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>
<body>
    <!-- Orientation Warning -->
    <div class="orientation-warning" id="orientationWarning">
        <div class="icon">📱</div>
        <h2>请横屏游戏</h2>
        <p>请将手机旋转至横屏模式以获得最佳游戏体验</p>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div class="ui-overlay">
            <!-- Top UI -->
            <div class="score-board">
                <div>🔴 红队: <span id="redScore">0</span></div>
                <div>🔵 蓝队: <span id="blueScore">0</span></div>
                <div>击杀: <span id="kills">0</span></div>
            </div>
            
            <div class="kill-feed" id="killFeed"></div>
            
            <div class="health-bar-container">
                <div class="health-fill" id="healthFill" style="width: 100%"></div>
                <div class="health-label">HP</div>
            </div>
            
            <div class="super-bar-container" id="superBarContainer">
                <div class="super-fill" id="superFill" style="width: 0%"></div>
                <div class="super-label">SUPER</div>
            </div>
            
            <div class="ammo-bar" id="ammoBar">
                <div class="ammo-bullet"></div>
                <div class="ammo-bullet"></div>
                <div class="ammo-bullet"></div>
            </div>
            
            <div class="pause-btn" id="pauseBtn">⏸</div>
            
            <!-- Touch Controls -->
            <div class="joystick-container" id="joystickContainer">
                <div class="joystick-base"></div>
                <div class="joystick-stick" id="joystickStick"></div>
            </div>
            
            <div class="action-buttons">
                <div class="btn-super" id="btnSuper"></div>
                <div class="btn-shoot" id="btnShoot"></div>
            </div>
            
            <div class="aim-area" id="aimArea"></div>
            
            <div class="controls-hint" id="controlsHint">
                拖动左侧摇杆移动 | 触摸右侧瞄准 | 点击按钮射击
            </div>
        </div>
        
        <!-- Character Selector -->
        <div class="character-selector" id="charSelector">
            <h2>🎮 选择你的英雄</h2>
            <div class="brawler-grid">
                <div class="brawler-card" data-brawler="shelly">
                    <div class="brawler-icon" style="background: linear-gradient(135deg, #8B4513, #D2691E);"></div>
                    <h3>雪莉</h3>
                    <p>散弹枪 | 高爆发</p>
                </div>
                <div class="brawler-card" data-brawler="colt">
                    <div class="brawler-icon" style="background: linear-gradient(135deg, #4169E1, #87CEEB);"></div>
                    <h3>柯尔特</h3>
                    <p>双枪 | 远程</p>
                </div>
                <div class="brawler-card" data-brawler="elprimo">
                    <div class="brawler-icon" style="background: linear-gradient(135deg, #DC143C, #FF6347);"></div>
                    <h3>艾尔·普里莫</h3>
                    <p>摔跤手 | 近战</p>
                </div>
                <div class="brawler-card" data-brawler="rico">
                    <div class="brawler-icon" style="background: linear-gradient(135deg, #32CD32, #98FB98);"></div>
                    <h3>瑞科</h3>
                    <p>弹球 | 技巧</p>
                </div>
                <div class="brawler-card" data-brawler="nita">
                    <div class="brawler-icon" style="background: linear-gradient(135deg, #9932CC, #DDA0DD);"></div>
                    <h3>妮塔</h3>
                    <p>召唤 | 持续</p>
                </div>
                <div class="brawler-card" data-brawler="dynamike">
                    <div class="brawler-icon" style="background: linear-gradient(135deg, #FFD700, #FFA500);"></div>
                    <h3>爆破麦克</h3>
                    <p>炸弹 | 范围</p>
                </div>
            </div>
            <button class="start-btn" id="startBtn">开始游戏</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game state
        let gameRunning = false;
        let selectedBrawler = null;
        let mouseX = 0;
        let mouseY = 0;
        let isPaused = false;
        
        // Touch controls state
        const touchState = {
            joystick: {
                active: false,
                touchId: null,
                centerX: 0,
                centerY: 0,
                currentX: 0,
                currentY: 0,
                dx: 0,
                dy: 0,
                angle: 0,
                force: 0
            },
            aim: {
                active: false,
                touchId: null,
                lastX: 0,
                lastY: 0,
                deltaX: 0,
                deltaY: 0
            },
            shoot: { active: false },
            super: { active: false }
        };
        
        // Camera
        let camera = { x: 0, y: 0 };
        
        // Map
        const MAP_WIDTH = 2000;
        const MAP_HEIGHT = 1500;
        
        // Canvas sizing
        function resizeCanvas() {
            const container = document.querySelector('.game-container');
            const aspectRatio = MAP_WIDTH / MAP_HEIGHT;
            let width = container.clientWidth;
            let height = container.clientHeight;
            
            // Maintain aspect ratio
            if (width / height > aspectRatio) {
                width = height * aspectRatio;
            } else {
                height = width / aspectRatio;
            }
            
            canvas.width = width;
            canvas.height = height;
            
            // Update joystick position reference
            updateJoystickPosition();
        }
        
        window.addEventListener('resize', resizeCanvas);
        
        // Walls and obstacles
        const walls = [
            // Center walls
            { x: 800, y: 600, width: 60, height: 300 },
            { x: 1140, y: 600, width: 60, height: 300 },
            { x: 800, y: 600, width: 400, height: 60 },
            
            // Corner walls
            { x: 200, y: 200, width: 150, height: 150 },
            { x: 1650, y: 200, width: 150, height: 150 },
            { x: 200, y: 1150, width: 150, height: 150 },
            { x: 1650, y: 1150, width: 150, height: 150 },
            
            // Side bushes
            { x: 500, y: 400, width: 100, height: 100, type: 'bush' },
            { x: 1400, y: 400, width: 100, height: 100, type: 'bush' },
            { x: 500, y: 1000, width: 100, height: 100, type: 'bush' },
            { x: 1400, y: 1000, width: 100, height: 100, type: 'bush' },
        ];
        
        // Brawler types
        const brawlerTypes = {
            shelly: {
                name: '雪莉',
                color: '#D2691E',
                maxHealth: 3600,
                speed: 3.5,
                damage: 420,

                reloadTime: 30,
                ammo: 3,
                superDamage: 800,
                spread: 5,
                type: 'shotgun'
            },
            colt: {

                color: '#4169E1',

                speed: 4,

                range: 280,

                ammo: 6,
                superDamage: 400,
                bulletCount: 6,
                type: 'machinegun'
            },
            elprimo: {
                name: '艾尔·普里莫',
                color: '#DC143C',
                maxHealth: 5800,
                speed: 5,
                damage: 480,
                range: 60,
                reloadTime: 40,
                ammo: 3,
                superDamage: 800,
                jumpRange: 200,
                type: 'melee'
            },
            rico: {
                name: '瑞科',
                color: '#32CD32',
                maxHealth: 2600,
                speed: 4,
                damage: 320,
                range: 300,
                reloadTime: 22,
                ammo: 5,
                superDamage: 320,
                bounces: 3,
                type: 'ricochet'
            },
            nita: {
                name: '妮塔',
                color: '#9932CC',
                maxHealth: 4000,
                speed: 3.8,
                damage: 960,
                range: 180,
                reloadTime: 35,
                ammo: 3,
                superDamage: 0,
                type: 'summoner'
            },
            dynamike: {
                name: '爆破麦克',
                color: '#FFD700',
                maxHealth: 2800,
                speed: 3.5,
                damage: 800,
                range: 220,
                reloadTime: 35,
                ammo: 3,
                superDamage: 1200,

        // Touch event handlers
        function initTouchControls() {
            const joystick = document.getElementById('joystickContainer');
            const stick = document.getElementById('joystickStick');
            const btnShoot = document.getElementById('btnShoot');
            const btnSuper = document.getElementById('btnSuper');

            joystick.addEventListener('touchend', handleJoystickEnd, { passive: false });

            // Aim area touch
            aimArea.addEventListener('touchstart', handleAimStart, { passive: false });
            aimArea.addEventListener('touchmove', handleAimMove, { passive: false });
            aimArea.addEventListener('touchend', handleAimEnd, { passive: false });
            aimArea.addEventListener('touchcancel', handleAimEnd, { passive: false });
            
            // Shoot button
            btnShoot.addEventListener('touchstart', (e) => {

            btnShoot.addEventListener('touchend', (e) => {
                e.preventDefault();
                touchState.shoot.active = false;
                btnShoot.classList.remove('active');
            }, { passive: false });
            
            // Super button
            btnSuper.addEventListener('touchstart', (e) => {

                btnSuper.classList.add('active');
                useSuper();

            btnSuper.addEventListener('touchend', (e) => {
                e.preventDefault();
                touchState.super.active = false;

            }, { passive: false });
            
            // Also support mouse for testing on desktop
            let joystickDragging = false;
            
            joystick.addEventListener('mousedown', (e) => {

                        identifier: 'mouse',
                        clientX: e.clientX,
                        clientY: e.clientY
                    }],
                    preventDefault: () => {}
                });
            });
            
            window.addEventListener('mousemove', (e) => {
                if (joystickDragging) {
                    handleJoystickMove({
                        touches: [{
                            identifier: 'mouse',
                            clientX: e.clientX,
                            clientY: e.clientY
                        }],
                        preventDefault: () => {}
                    });
                }
            });
            
            window.addEventListener('mouseup', () => {
                if (joystickDragging) {
                    joystickDragging = false;
                    handleJoystickEnd({
                        touches: [],

            btnSuper.addEventListener('mousedown', () => {

            btnSuper.addEventListener('mouseup', () => {
                touchState.super.active = false;
                btnSuper.classList.remove('active');

        function handleJoystickStart(e) {
            e.preventDefault();
            updateJoystickPosition();
            
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                const rect = joystickRect || document.getElementById('joystickContainer').getBoundingClientRect();
                
                // Check if touch is on joystick
                const dx = touch.clientX - (rect.left + rect.width / 2);
                const dy = touch.clientY - (rect.top + rect.height / 2);
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < rect.width) {
                    touchState.joystick.active = true;
                    touchState.joystick.touchId = touch.identifier;
                    touchState.joystick.centerX = rect.left + rect.width / 2;
                    touchState.joystick.centerY = rect.top + rect.height / 2;
                    updateJoystickVisual(touch.clientX, touch.clientY);
                    break;
                }
            }
        }
        
        function handleJoystickMove(e) {
            e.preventDefault();
            if (!touchState.joystick.active) return;
            
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                if (touch.identifier === touchState.joystick.touchId) {
                    updateJoystickVisual(touch.clientX, touch.clientY);
                    break;
                }
            }
        }
        
        function handleJoystickEnd(e) {
            e.preventDefault();
            
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.identifier === touchState.joystick.touchId) {
                    touchState.joystick.active = false;
                    touchState.joystick.touchId = null;
                    touchState.joystick.dx = 0;
                    touchState.joystick.dy = 0;
                    touchState.joystick.force = 0;
                    
                    // Reset stick position
                    const stick = document.getElementById('joystickStick');
                    stick.style.transform = 'translate(-50%, -50%)';
                    stick.classList.remove('active');
                    break;
                }
            }
        }
        
        function updateJoystickVisual(clientX, clientY) {
            const stick = document.getElementById('joystickStick');
            const maxDist = 35; // Max stick movement
            
            let dx = clientX - touchState.joystick.centerX;
            let dy = clientY - touchState.joystick.centerY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            // Calculate force (0-1)
            touchState.joystick.force = Math.min(dist / maxDist, 1);
            
            // Clamp to max distance
            if (dist > maxDist) {
                dx = (dx / dist) * maxDist;
                dy = (dy / dist) * maxDist;
            }
            
            touchState.joystick.dx = dx / maxDist;
            touchState.joystick.dy = dy / maxDist;
            touchState.joystick.angle = Math.atan2(dy, dx);
            
            stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            stick.classList.add('active');
        }
        
        // Aim handling
        function handleAimStart(e) {
            e.preventDefault();
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                if (!touchState.joystick.active || touch.identifier !== touchState.joystick.touchId) {
                    touchState.aim.active = true;
                    touchState.aim.touchId = touch.identifier;
                    touchState.aim.lastX = touch.clientX;
                    touchState.aim.lastY = touch.clientY;
                    
                    // Set initial aim angle based on touch position
                    const rect = canvas.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    player.angle = Math.atan2(touch.clientY - centerY, touch.clientX - centerX);
                    break;
                }
            }
        }
        
        function handleAimMove(e) {
            e.preventDefault();
            if (!touchState.aim.active) return;
            
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                if (touch.identifier === touchState.aim.touchId) {
                    const rect = canvas.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    player.angle = Math.atan2(touch.clientY - centerY, touch.clientX - centerX);
                    break;
                }
            }
        }
        
        function handleAimEnd(e) {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.identifier === touchState.aim.touchId) {
                    touchState.aim.active = false;
                    touchState.aim.touchId = null;
                    break;
                }
            }
        }
        
        // Keyboard controls (keep for desktop compatibility)
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            
            if (!gameRunning) {
                // Character selection navigation
                const currentRow = Math.floor(focusedIndex / cols);
                const currentCol = focusedIndex % cols;
                
                switch(e.key) {
                    case 'ArrowUp':
                        e.preventDefault();
                        if (currentRow > 0) focusedIndex -= cols;
                        updateFocus();
                        break;
                    case 'ArrowDown':
                        e.preventDefault();
                        if (currentRow < rows - 1) focusedIndex += cols;
                        updateFocus();
                        break;
                    case 'ArrowLeft':
                        e.preventDefault();
                        if (currentCol > 0) focusedIndex--;
                        updateFocus();
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        if (currentCol < cols - 1) focusedIndex++;
                        updateFocus();
                        break;
                    case 'Enter':
                        e.preventDefault();
                        if (document.getElementById('charSelector').style.display !== 'none') {
                            selectedIndex = focusedIndex;
                            updateSelection();
                            document.getElementById('startBtn').click();
                        }
                        break;
                }
            }
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;

        function shoot(shooter) {
            if (shooter.ammo <= 0 || shooter.reloadTimer > 0) return;
            
            const stats = shooter.type || brawlerTypes[selectedBrawler];
            shooter.ammo--;
            shooter.reloadTimer = stats.reloadTime;
            
            if (stats.type === 'shotgun') {
                for (let i = 0; i < stats.spread; i++) {
                    const spreadAngle = (i - stats.spread / 2) * 0.15;
                    bullets.push({
                        x: shooter.x + Math.cos(shooter.angle) * 30,
                        y: shooter.y + Math.sin(shooter.angle) * 30,
                        angle: shooter.angle + spreadAngle,
                        speed: 12,
                        damage: stats.damage / stats.spread,
                        range: stats.range,
                        traveled: 0,
                        owner: shooter,
                        team: shooter.team,
                        color: '#ffff00'
                    });
                }
            } else if (stats.type === 'machinegun') {
                for (let i = 0; i < stats.bulletCount; i++) {
                    setTimeout(() => {
                        bullets.push({
                            x: shooter.x + Math.cos(shooter.angle) * 30,
                            y: shooter.y + Math.sin(shooter.angle) * 30,
                            angle: shooter.angle + (Math.random() - 0.5) * 0.1,
                            speed: 15,
                            damage: stats.damage,
                            range: stats.range,
                            traveled: 0,
                            owner: shooter,
                            team: shooter.team,
                            color: '#ffff00'
                        });
                    }, i * 50);
                }
            } else if (stats.type === 'thrower') {
                bullets.push({
                    x: shooter.x,
                    y: shooter.y,
                    angle: shooter.angle,
                    speed: 8,
                    damage: stats.damage,
                    range: stats.range,
                    traveled: 0,
                    owner: shooter,
                    team: shooter.team,
                    color: '#ff6600',
                    arc: true,
                    arcHeight: 0
                });
            } else {
                bullets.push({
                    x: shooter.x + Math.cos(shooter.angle) * 30,
                    y: shooter.y + Math.sin(shooter.angle) * 30,
                    angle: shooter.angle,
                    speed: stats.type === 'melee' ? 0 : 12,
                    damage: stats.damage,
                    range: stats.range,
                    traveled: 0,
                    owner: shooter,
                    team: shooter.team,
                    color: stats.type === 'melee' ? '#ff0000' : '#ffff00',
                    isMelee: stats.type === 'melee'
                });
            }
            
            updateAmmoUI();
        }
        
        function useSuper() {
            if (player.superCharge < 100) return;
            
            player.superCharge = 0;
            const stats = player.type;
            
            if (stats.type === 'melee') {
                const jumpDist = stats.jumpRange;
                const targetX = player.x + Math.cos(player.angle) * jumpDist;
                const targetY = player.y + Math.sin(player.angle) * jumpDist;
                
                enemies.forEach(enemy => {
                    const dx = enemy.x - targetX;
                    const dy = enemy.y - targetY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 100) {
                        damageEnemy(enemy, stats.superDamage, player);
                    }
                });
                
                player.x = targetX;
                player.y = targetY;
                createExplosion(targetX, targetY, '#ff0000', 30);
            } else if (selectedBrawler === 'nita') {
                if (!player.hasBear) {
                    player.bear = {
                        x: player.x + Math.cos(player.angle) * 50,
                        y: player.y + Math.sin(player.angle) * 50,
                        health: 4000,
                        target: null
                    };
                    player.hasBear = true;
                }
            } else {
                for (let i = 0; i < 8; i++) {
                    bullets.push({
                        x: player.x,
                        y: player.y,
                        angle: player.angle + (i - 4) * 0.2,
                        speed: 15,
                        damage: stats.superDamage,
                        range: stats.range * 1.5,
                        traveled: 0,
                        owner: player,
                        team: player.team,
                        color: '#ff00ff',
                        isSuper: true
                    });
                }
            }
            
            updateSuperUI();
        }
        
        function damageEnemy(enemy, damage, attacker) {
            if (enemy.invulnerable > 0) return;
            
            enemy.health -= damage;
            enemy.invulnerable = 10;
            
            createDamageNumber(enemy.x, enemy.y, damage);
            
            if (enemy.health <= 0) {
                createExplosion(enemy.x, enemy.y, '#ff0000', 50);
                
                enemy.x = Math.random() * MAP_WIDTH;
                enemy.y = Math.random() * MAP_HEIGHT;
                enemy.health = enemy.maxHealth;
                enemy.ammo = enemy.maxAmmo;
                
                if (attacker === player) {
                    player.kills++;
                    document.getElementById('kills').textContent = player.kills;
                    addKillFeed(player.type.name, enemy.type.name);
                }
            }
        }
        
        function createExplosion(x, y, color, size) {
            for (let i = 0; i < size; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 30,
                    color: color,
                    size: Math.random() * 5 + 2
                });
            }
        }
        
        function createDamageNumber(x, y, damage) {
            particles.push({
                x: x,
                y: y - 30,
                vx: 0,
                vy: -2,
                life: 40,
                text: Math.floor(damage),
                isText: true

        function addKillFeed(killer, victim) {
            const feed = document.getElementById('killFeed');
            const msg = document.createElement('div');
            msg.className = 'kill-message';
            msg.innerHTML = `<span style="color:#ffff00">${killer}</span> 💀 ${victim}`;
            feed.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);

        function updateAmmoUI() {
            const ammoBar = document.getElementById('ammoBar');
            ammoBar.innerHTML = '';
            for (let i = 0; i < player.maxAmmo; i++) {
                const bullet = document.createElement('div');
                bullet.className = 'ammo-bullet';
                if (i >= player.ammo) bullet.classList.add('empty');
                ammoBar.appendChild(bullet);
            }
        }
        
        function updateSuperUI() {
            const superFill = document.getElementById('superFill');
            const superContainer = document.getElementById('superBarContainer');
            const btnSuper = document.getElementById('btnSuper');
            
            superFill.style.width = player.superCharge + '%';
            
            if (player.superCharge >= 100) {
                superContainer.classList.add('super-ready');
                btnSuper.classList.add('ready');
            } else {
                superContainer.classList.remove('super-ready');
                btnSuper.classList.remove('ready');
            }
        }
        
        function updateHealthUI() {
            const healthFill = document.getElementById('healthFill');
            healthFill.style.width = (player.health / player.maxHealth * 100) + '%';
        }
        
        function checkWallCollision(x, y, radius) {
            for (const wall of walls) {
                if (wall.type === 'bush') continue;
                if (x + radius > wall.x && x - radius < wall.x + wall.width &&
                    y + radius > wall.y && y - radius < wall.y + wall.height) {
                    return true;
                }
            }
            return false;
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            
            if (isPaused) {
                requestAnimationFrame(gameLoop);
                return;
            }
            
            // Clear canvas
            ctx.fillStyle = '#2d4a3e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Update camera
            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
            camera.x = Math.max(0, Math.min(camera.x, MAP_WIDTH - canvas.width));
            camera.y = Math.max(0, Math.min(camera.y, MAP_HEIGHT - canvas.height));
            
            ctx.save();
            ctx.translate(-camera.x, -camera.y);
            
            // Draw grid
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= MAP_WIDTH; x += 100) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, MAP_HEIGHT);
                ctx.stroke();
            }
            for (let y = 0; y <= MAP_HEIGHT; y += 100) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(MAP_WIDTH, y);
                ctx.stroke();
            }
            
            // Draw walls
            walls.forEach(wall => {
                if (wall.type === 'bush') {
                    ctx.fillStyle = 'rgba(34, 139, 34, 0.7)';
                    ctx.fillRect(wall.x, wall.y, wall.width, wall.height);
                } else {
                    ctx.fillStyle = '#666';
                    ctx.fillRect(wall.x, wall.y, wall.width, wall.height);
                    ctx.strokeStyle = '#888';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(wall.x, wall.y, wall.width, wall.height);
                }
            });
            
            // Power-ups
            powerups.forEach((powerup, index) => {
                powerup.pulse += 0.1;
                const scale = 1 + Math.sin(powerup.pulse) * 0.2;
                
                const colors = {
                    health: '#ff4444',
                    ammo: '#ffff44',
                    speed: '#4444ff',
                    shield: '#44ffff'
                };
                
                ctx.save();
                ctx.translate(powerup.x, powerup.y);
                ctx.scale(scale, scale);
                ctx.fillStyle = colors[powerup.type];
                ctx.beginPath();
                ctx.arc(0, 0, powerup.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.fillStyle = '#fff';
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                const icons = { health: '❤', ammo: '🔫', speed: '⚡', shield: '🛡' };
                ctx.fillText(icons[powerup.type], 0, 5);
                ctx.restore();
                
                const dx = player.x - powerup.x;
                const dy = player.y - powerup.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < player.radius + powerup.radius) {
                    if (powerup.type === 'health') {
                        player.health = Math.min(player.health + 1000, player.maxHealth);
                    } else if (powerup.type === 'ammo') {
                        player.ammo = player.maxAmmo;
                        player.reloadTimer = 0;
                    }
                    powerups.splice(index, 1);
                    spawnPowerup();
                    updateAmmoUI();
                    updateHealthUI();
                }
            });
            
            // Player movement - combine keyboard and touch
            let dx = 0, dy = 0;
            
            // Keyboard input
            if (keys['w']) dy -= player.speed;
            if (keys['s']) dy += player.speed;
            if (keys['a']) dx -= player.speed;
            if (keys['d']) dx += player.speed;
            
            // Touch joystick input
            if (touchState.joystick.active && touchState.joystick.force > 0.1) {
                const speed = player.speed * touchState.joystick.force;
                dx = Math.cos(touchState.joystick.angle) * speed;
                dy = Math.sin(touchState.joystick.angle) * speed;
            }
            
            const newX = player.x + dx;
            const newY = player.y + dy;
            
            if (!checkWallCollision(newX, player.y, player.radius)) player.x = newX;
            if (!checkWallCollision(player.x, newY, player.radius)) player.y = newY;
            
            player.x = Math.max(player.radius, Math.min(player.x, MAP_WIDTH - player.radius));
            player.y = Math.max(player.radius, Math.min(player.y, MAP_HEIGHT - player.radius));
            
            // Mouse aiming (desktop)
            if (!touchState.aim.active) {
                player.angle = Math.atan2(mouseY + camera.y - player.y, mouseX + camera.x - player.x);
            }
            
            // Reload
            if (player.reloadTimer > 0) {
                player.reloadTimer--;
                if (player.reloadTimer <= 0 && player.ammo < player.maxAmmo) {
                    player.ammo++;
                    player.reloadTimer = player.type.reloadTime;
                    updateAmmoUI();
                }
            }
            
            if (player.invulnerable > 0) player.invulnerable--;
            
            // Draw bear
            if (player.hasBear && player.bear) {
                const bear = player.bear;
                let nearest = null;
                let nearestDist = 300;
                enemies.forEach(enemy => {
                    const dist = Math.sqrt((enemy.x - bear.x) ** 2 + (enemy.y - bear.y) ** 2);
                    if (dist < nearestDist) {
                        nearestDist = dist;
                        nearest = enemy;
                    }
                });
                
                if (nearest) {
                    const angle = Math.atan2(nearest.y - bear.y, nearest.x - bear.x);
                    bear.x += Math.cos(angle) * 3;
                    bear.y += Math.sin(angle) * 3;
                    
                    if (nearestDist < 40) {
                        nearest.health -= 200;
                        if (nearest.health <= 0) damageEnemy(nearest, 0, player);
                    }
                }
                
                ctx.fillStyle = '#8B4513';
                ctx.beginPath();
                ctx.arc(bear.x, bear.y, 25, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(bear.x, bear.y - 15, 15, Math.PI, 0);
                ctx.fill();
            }
            
            // Draw player
            ctx.save();
            ctx.translate(player.x, player.y);
            
            if (player.health < player.maxHealth) {
                ctx.strokeStyle = `hsl(${player.health / player.maxHealth * 120}, 100%, 50%)`;
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(0, 0, player.radius + 8, 0, Math.PI * 2 * (player.health / player.maxHealth));
                ctx.stroke();
            }
            
            ctx.rotate(player.angle);
            
            ctx.fillStyle = player.type ? player.type.color : '#D2691E';
            ctx.beginPath();
            ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#333';
            ctx.fillRect(15, -6, 20, 12);
            ctx.fillStyle = '#666';
            ctx.fillRect(18, -4, 14, 8);
            
            ctx.fillStyle = '#ff6600';
            ctx.beginPath();
            ctx.arc(35, 0, 4, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
            
            // Aim line
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.strokeStyle = 'rgba(255, 255, 0, 0.3)';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(30, 0);
            ctx.lineTo(player.type ? player.type.range : 200, 0);
            ctx.stroke();
            ctx.restore();
            
            // Enemies
            enemies.forEach(enemy => {
                enemy.moveTimer--;
                if (enemy.moveTimer <= 0) {
                    enemy.targetX = Math.random() * MAP_WIDTH;
                    enemy.targetY = Math.random() * MAP_HEIGHT;
                    enemy.moveTimer = 100 + Math.random() * 100;
                }
                
                const angle = Math.atan2(enemy.targetY - enemy.y, enemy.targetX - enemy.x);
                const speed = enemy.type.speed;
                const newEX = enemy.x + Math.cos(angle) * speed;
                const newEY = enemy.y + Math.sin(angle) * speed;
                
                if (!checkWallCollision(newEX, enemy.y, enemy.radius)) enemy.x = newEX;
                if (!checkWallCollision(enemy.x, newEY, enemy.radius)) enemy.y = newEY;
                
                const distToPlayer = Math.sqrt((player.x - enemy.x) ** 2 + (player.y - enemy.y) ** 2);
                if (distToPlayer < enemy.type.range && enemy.ammo > 0 && enemy.reloadTimer <= 0) {
                    enemy.angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                    shoot(enemy);
                }
                
                if (enemy.reloadTimer > 0) enemy.reloadTimer--;
                if (enemy.invulnerable > 0) enemy.invulnerable--;
                
                ctx.save();
                ctx.translate(enemy.x, enemy.y);
                
                if (enemy.health < enemy.maxHealth) {
                    ctx.strokeStyle = `hsl(${enemy.health / enemy.maxHealth * 120}, 100%, 50%)`;
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.arc(0, 0, enemy.radius + 8, 0, Math.PI * 2 * (enemy.health / enemy.maxHealth));
                    ctx.stroke();
                }
                
                ctx.fillStyle = enemy.team === 'red' ? 'rgba(255,0,0,0.3)' : 'rgba(0,0,255,0.3)';
                ctx.beginPath();
                ctx.arc(0, 0, enemy.radius + 5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.rotate(enemy.angle);
                
                ctx.fillStyle = enemy.type.color;
                ctx.beginPath();
                ctx.arc(0, 0, enemy.radius, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#fff';
                ctx.fillRect(10, -5, 15, 10);
                
                ctx.restore();
            });
            
            // Bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                
                if (b.arc) {
                    b.x += Math.cos(b.angle) * b.speed;
                    b.arcHeight += 0.5;
                    if (b.arcHeight > 10) b.arcHeight = 10;
                } else if (!b.isMelee) {
                    b.x += Math.cos(b.angle) * b.speed;
                    b.y += Math.sin(b.angle) * b.speed;
                }
                
                b.traveled += b.speed;
                
                if (checkWallCollision(b.x, b.y, 5)) {
                    if (b.type === 'ricochet' && b.bounces > 0) {
                        b.angle = -b.angle;
                        b.bounces--;
                    } else {
                        createExplosion(b.x, b.y, '#ffff00', 10);
                        bullets.splice(i, 1);
                        continue;
                    }
                }
                
                if (b.traveled > b.range) {
                    bullets.splice(i, 1);
                    continue;
                }
                
                ctx.fillStyle = b.color;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.isMelee ? 40 : (b.isSuper ? 8 : 5), 0, Math.PI * 2);
                ctx.fill();
                
                if (b.isSuper) {
                    ctx.fillStyle = 'rgba(255,0,255,0.3)';
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, 15, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                if (b.owner === player) {
                    enemies.forEach(enemy => {
                        const dx = enemy.x - b.x;
                        const dy = enemy.y - b.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist < enemy.radius + (b.isMelee ? 40 : 10) && enemy.invulnerable <= 0) {
                            damageEnemy(enemy, b.damage, player);
                            if (player.superCharge < 100) {
                                player.superCharge = Math.min(100, player.superCharge + 10);
                                updateSuperUI();
                            }
                            if (!b.isMelee) bullets.splice(i, 1);
                        }
                    });
                } else {
                    const dx = player.x - b.x;
                    const dy = player.y - b.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < player.radius + 10 && player.invulnerable <= 0) {
                        player.health -= b.damage;
                        player.invulnerable = 20;
                        createDamageNumber(player.x, player.y, b.damage);
                        updateHealthUI();
                        
                        if (player.health <= 0) {
                            player.health = player.maxHealth;
                            player.x = MAP_WIDTH / 2;
                            player.y = MAP_HEIGHT / 2;
                            createExplosion(player.x, player.y, '#ff0000', 50);
                        }
                        
                        bullets.splice(i, 1);
                    }
                }
            }
            
            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                
                if (p.isText) {
                    ctx.fillStyle = `rgba(255,255,255,${p.life / 40})`;
                    ctx.font = 'bold 20px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(p.text, p.x, p.y);
                } else {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life / 30;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }
            
            ctx.restore();
            
            requestAnimationFrame(gameLoop);
        }
        
        // Initialize
        initTouchControls();
        resizeCanvas();
    </script>
</body>
</html>
